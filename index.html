<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Informe | Los Alpes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #000; color: #cbd5e1; }
    .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); }
    .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 1.2rem; border-radius: 1.2rem; width: 100%; outline: none; text-align: center; font-size: 1.2rem; }
    .btn-grad { background: linear-gradient(135deg, #5a398a 0%, #7b5aa6 100%); color: white; font-weight: 800; padding: 1.2rem; border-radius: 1.2rem; width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-active-si { border: 2px solid #7b5aa6; background: rgba(123, 90, 166, 0.2); }
    .btn-active-no { border: 2px solid #ef4444; background: rgba(239, 68, 68, 0.1); }
    /* Mejora de fondo y centrado */
    html, body { 
      height: 100%; 
      margin: 0; 
      overflow-x: hidden;
    }
    
    body {
      display: flex;
      flex-direction: column;
      justify-content: center; /* Centra el contenido verticalmente */
      align-items: center;
      min-h-screen;
      background: radial-gradient(circle at 50% 50%, #120d1d 0%, #000000 100%);
    }

    /* Pequeña animación de entrada para los pasos */
    #step-1, #step-2, #step-3 {
      animation: fadeIn 0.4s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body class="p-4">
  <div class="w-full max-w-md space-y-6">
    
    <header class="glass p-8 rounded-[2.5rem] text-center space-y-3">
      <div class="h-14 w-14 bg-purple-600 rounded-2xl flex items-center justify-center mx-auto shadow-lg shadow-purple-500/20">
        <i data-lucide="send" class="text-white"></i>
      </div>
      <h1 class="text-2xl font-extrabold text-white">Enviar Informe</h1>
      <p id="label-mes" class="text-purple-400 font-bold text-xs uppercase tracking-widest"></p>
    </header>

    <div id="step-1" class="glass p-6 rounded-[2rem] space-y-4 text-center">
      <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">¿Cuál es tu grupo?</p>
      <div class="grid grid-cols-4 gap-2">
        <button onclick="elegirGrupo(1)" class="glass p-4 rounded-xl font-black text-xl">1</button>
        <button onclick="elegirGrupo(2)" class="glass p-4 rounded-xl font-black text-xl">2</button>
        <button onclick="elegirGrupo(3)" class="glass p-4 rounded-xl font-black text-xl">3</button>
        <button onclick="elegirGrupo(4)" class="glass p-4 rounded-xl font-black text-xl">4</button>
        <button onclick="elegirGrupo(5)" class="glass p-4 rounded-xl font-black text-xl">5</button>
        <button onclick="elegirGrupo(6)" class="glass p-4 rounded-xl font-black text-xl">6</button>
        <button onclick="elegirGrupo(7)" class="glass p-4 rounded-xl font-black text-xl">7</button>
      </div>
    </div>

    <div id="step-2" class="hidden glass p-6 rounded-[2rem] space-y-4">
      <div id="list-container" class="max-h-80 overflow-y-auto space-y-2"></div>
    </div>

    <div id="step-3" class="hidden glass p-8 rounded-[2.5rem] space-y-6">
      <div class="text-center border-b border-white/5 pb-4">
        <h2 id="display-nombre" class="text-xl font-extrabold text-white"></h2>
        <p id="display-categoria" class="text-[10px] text-purple-400 font-bold uppercase mt-1"></p>
      </div>

      <div id="form-pub" class="hidden space-y-6">
        <p class="text-[10px] font-bold text-slate-500 uppercase text-center">¿Participó en alguna faceta del ministerio?</p>
        
        <div class="flex gap-4">
          <button onclick="setParticipo(true)" id="btn-si" class="flex-1 glass p-5 rounded-2xl font-bold text-lg">SÍ</button>
          <button onclick="setParticipo(false)" id="btn-no" class="flex-1 glass p-5 rounded-2xl font-bold text-lg">NO</button>
        </div>
        <div class="space-y-2 text-center">
          <label class="text-[10px] font-bold text-slate-500 uppercase">Estudios Bíblicos</label>
          <input type="number" id="est-pub" class="input-field text-3xl font-black" value="0">
        </div>
      </div>

      <div id="form-pre" class="hidden space-y-6 text-center">
        <div class="space-y-2 text-center">
          <label class="text-[10px] font-bold text-slate-500 uppercase">Horas</label>
          <input type="number" id="horas-pre" class="input-field text-5xl font-black" placeholder="0">
        </div>
        <div class="space-y-2 text-center">
          <label class="text-[10px] font-bold text-slate-500 uppercase">Estudios Bíblicos</label>
          <input type="number" id="est-pre" class="input-field text-3xl font-black" value="0">
        </div>
      </div>

      <button onclick="enviar()" id="btn-enviar" class="btn-grad text-lg shadow-lg shadow-purple-500/20">
        <i data-lucide="check-circle" class="w-6"></i> ENVIAR INFORME
      </button>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    // USA EXACTAMENTE EL URL QUE PEGASTE EN EL BROWSER
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTOM6Eo5yYGVtJqnBhqkjAfAZ-i3_KttrLCtMmAQa2CrSyZse6PTuHOoTMYQXTxinG4g/exec";

    const mesesAbrev = ['ene','feb','mar','abr','may','jun','jul','ago','sept','oct','nov','dic'];
    const hoy = new Date();
    const fReporte = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
    const mAbrev = mesesAbrev[fReporte.getMonth()];
    const mNombre = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'][fReporte.getMonth()];
    document.getElementById('label-mes').textContent = "MES DE " + mNombre.toUpperCase();

    let pubs = [];
    let seleccionado = null;
    let participoVal = null;

    async function elegirGrupo(g) {
  document.getElementById('step-2').classList.remove('hidden');
  
  // Mantenemos TU TEXTO, pero le añadimos el círculo de carga arriba
  document.getElementById('list-container').innerHTML = `
    <div class="flex flex-col items-center justify-center py-16 space-y-6">
      <div class="animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-purple-500 shadow-[0_0_20px_rgba(168,85,247,0.3)]"></div>
      
      <p class="text-purple-400 font-bold animate-pulse text-[10px] tracking-widest uppercase text-center">
        Espera un momento...
      </p>
    </div>
  `;
  
  // El resto del código sigue intacto (Seguridad total)
  const res = await fetch(`${SCRIPT_URL}?action=getProgresoGrupo&grupo=${g}&mes=${mAbrev}`);
  const json = await res.json();
  
  pubs = [...json.data.completados, ...json.data.pendientes];
  renderList(pubs);
}

    function renderList(list) {
      document.getElementById('list-container').innerHTML = list.map(u => `
        <div class="glass p-4 rounded-xl flex justify-between items-center mb-2 active:scale-95 transition-all" onclick="selectPub('${u.nombre}', '${u.categoria}')">
          <span class="font-bold text-white text-sm">${u.nombre}</span>
          <i data-lucide="chevron-right" class="w-4 text-slate-600"></i>
        </div>`).join('');
      lucide.createIcons();
    }

    function selectPub(nombre, cat) {
      seleccionado = { nombre, categoria: cat };
      document.getElementById('step-1').classList.add('hidden');
      document.getElementById('step-2').classList.add('hidden');
      document.getElementById('step-3').classList.remove('hidden');
      document.getElementById('display-nombre').textContent = nombre;
      document.getElementById('display-categoria').textContent = cat;
      
      const esPre = cat.toLowerCase().includes('precursor');
      document.getElementById('form-pre').classList.toggle('hidden', !esPre);
      document.getElementById('form-pub').classList.toggle('hidden', esPre);
      lucide.createIcons();
    }

    function setParticipo(val) {
      participoVal = val;
      document.getElementById('btn-si').className = val ? 'flex-1 glass p-5 rounded-2xl font-bold btn-active-si text-white' : 'flex-1 glass p-5 rounded-2xl font-bold';
      document.getElementById('btn-no').className = !val ? 'flex-1 glass p-5 rounded-2xl font-bold btn-active-no text-white' : 'flex-1 glass p-5 rounded-2xl font-bold';
    }

    async function enviar() {
      const btn = document.getElementById('btn-enviar');
      btn.disabled = true; 
      btn.textContent = "ENVIANDO...";
      
      const esPre = seleccionado.categoria.toLowerCase().includes('precursor');
      
      // Construimos la URL con los datos (Método GET)
      let urlParams = `${SCRIPT_URL}?action=guardarInforme&nombre=${encodeURIComponent(seleccionado.nombre)}&mes=${mAbrev}`;
      
      if (esPre) {
        const h = document.getElementById('horas-pre').value || 0;
        const e = document.getElementById('est-pre').value || 0;
        urlParams += `&esPrecursor=true&horas=${h}&estudios=${e}`;
      } else {
        if (participoVal === null) { 
          alert("Selecciona SÍ o NO"); 
          btn.disabled = false; 
          btn.textContent = "ENVIAR INFORME"; 
          return; 
        }
        const e = document.getElementById('est-pub').value || 0;
        urlParams += `&participo=${participoVal}&estudios=${e}`;
      }

      try {
        // El modo 'no-cors' hace que el envío sea instantáneo
        fetch(urlParams, { mode: 'no-cors' });
        
        // Mostramos la pantalla de éxito de inmediato
        document.body.innerHTML = `
          <div class="h-screen flex flex-col items-center justify-center p-8 text-center">
            <div class="h-20 w-20 bg-emerald-500 rounded-full flex items-center justify-center mb-6 shadow-lg shadow-emerald-500/20">
              <i data-lucide="check" class="text-white w-10 h-10 text-4xl font-black"></i>
            </div>
            <h1 class="text-4xl font-black text-white leading-tight uppercase">¡Enviado!</h1>
            <p class="text-purple-400 font-bold text-lg mt-2">Gracias por tu informe, ${seleccionado.nombre.split(' ')[0]}.</p>
            <button onclick="location.reload()" class="mt-10 text-xs font-black text-slate-500 uppercase tracking-[0.2em]">VOLVER AL INICIO</button>
          </div>`;
        lucide.createIcons();
      } catch (e) {
        alert("Hubo un problema. Intenta de nuevo.");
        btn.disabled = false;
        btn.textContent = "ENVIAR INFORME";
      }
    }
  </script>
</body>
</html>
