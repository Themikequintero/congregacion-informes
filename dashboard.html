<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secretaría Pro | Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
    body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; }
    .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
  </style>
</head>
<body class="text-slate-200 p-4 pb-20">

  <div class="max-w-md mx-auto space-y-6">
    
    <header class="flex items-center justify-between pt-4">
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight text-white">Progreso<span class="text-purple-500">Informes</span></h1>
        <p class="text-slate-500 text-sm font-semibold uppercase tracking-widest" id="mes-label"></p>
      </div>
      <div class="h-12 w-12 rounded-2xl bg-gradient-to-br from-purple-600 to-indigo-600 flex items-center justify-center shadow-lg shadow-purple-500/20">
        <i data-lucide="layout-grid" class="text-white"></i>
      </div>
    </header>

    <div class="relative">
      <select id="grupo-select" class="w-full bg-slate-900 border-2 border-slate-800 text-white p-5 rounded-2xl appearance-none focus:border-purple-500 outline-none transition-all font-bold text-lg shadow-xl">
        <option value="">Seleccionar Grupo</option>
        <option value="1">Grupo 1</option><option value="2">Grupo 2</option>
        <option value="3">Grupo 3</option><option value="4">Grupo 4</option>
        <option value="5">Grupo 5</option><option value="6">Grupo 6</option>
        <option value="7">Grupo 7</option>
      </select>
      <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-slate-500">
        <i data-lucide="chevron-down"></i>
      </div>
    </div>

    <div id="loading" class="hidden flex flex-col items-center py-12 space-y-4">
      <div class="h-10 w-10 border-4 border-purple-500/20 border-t-purple-500 rounded-full animate-spin"></div>
      <p class="text-slate-400 font-medium animate-pulse">Sincronizando datos...</p>
    </div>

    <main id="main-content" class="hidden space-y-4">
      
      <div class="glass p-6 rounded-[2.5rem] relative overflow-hidden">
        <div class="relative z-10">
          <p class="text-slate-400 text-xs font-bold uppercase tracking-wider mb-1">Progreso General</p>
          <div class="flex items-end gap-2">
            <span class="text-6xl font-black text-white" id="val-progreso">0%</span>
          </div>
          <div class="w-full h-3 bg-slate-800 rounded-full mt-4 overflow-hidden">
            <div id="bar-progreso" class="h-full bg-gradient-to-r from-purple-600 to-emerald-500 transition-all duration-1000" style="width: 0%"></div>
          </div>
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="glass p-5 rounded-[2rem]">
          <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Horas</p>
          <p class="text-3xl font-bold text-white" id="val-horas">0</p>
        </div>
        <div class="glass p-5 rounded-[2rem]">
          <p class="text-slate-500 text-[10px] font-bold uppercase mb-1">Estudios</p>
          <p class="text-3xl font-bold text-white" id="val-estudios">0</p>
        </div>
      </div>

      <section class="space-y-4">
        <div class="flex items-center justify-between px-2">
          <h2 class="font-bold text-slate-300 flex items-center gap-2">
            <i data-lucide="check-circle" class="text-emerald-500 w-5"></i> Informes
          </h2>
          <span id="count-c" class="bg-emerald-500/10 text-emerald-500 text-xs font-bold px-3 py-1 rounded-full">0</span>
        </div>
        <div id="list-c" class="space-y-2"></div>

        <div class="flex items-center justify-between px-2 pt-4">
          <h2 class="font-bold text-slate-300 flex items-center gap-2">
            <i data-lucide="clock" class="text-orange-500 w-5"></i> Pendientes
          </h2>
          <span id="count-p" class="bg-orange-500/10 text-orange-500 text-xs font-bold px-3 py-1 rounded-full">0</span>
        </div>
        <div id="list-p" class="space-y-2"></div>
      </section>

    </main>
  </div>

  <script>
  lucide.createIcons();
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxTOM6Eo5yYGVtJqnBhqkjAfAZ-i3_KttrLCtMmAQa2CrSyZse6PTuHOoTMYQXTxinG4g/exec";

  // 1. LÓGICA DE FECHA AUTOMÁTICA
  const mesesFull = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
  const mesesAbrev = ['ene', 'feb', 'mar', 'abr', 'may', 'jun', 'jul', 'ago', 'sept', 'oct', 'nov', 'dic'];
  
  const hoy = new Date();
  // Restamos un mes para obtener el periodo de informe
  const fechaReporte = new Date(hoy.getFullYear(), hoy.getMonth() - 1, 1);
  
  const nombreMes = mesesFull[fechaReporte.getMonth()];
  const abrevMes = mesesAbrev[fechaReporte.getMonth()];
  const anio = fechaReporte.getFullYear();

  // Ponemos el nombre en el letrero apenas carga la página
  document.getElementById('mes-label').textContent = nombreMes + " " + anio;

  // 2. EVENTO DE CAMBIO DE GRUPO
  document.getElementById('grupo-select').addEventListener('change', async (e) => {
    if (!e.target.value) return;
    
    const loading = document.getElementById('loading');
    const content = document.getElementById('main-content');
    
    loading.classList.remove('hidden');
    content.classList.add('hidden');

    try {
      // Usamos ${abrevMes} para que la consulta sea dinámica según el mes actual
      const response = await fetch(`${SCRIPT_URL}?action=getProgresoGrupo&grupo=${e.target.value}&mes=${abrevMes}`);
      const result = await response.json();
      const data = result.data;

      document.getElementById('val-progreso').innerText = data.porcentaje + "%";
      document.getElementById('bar-progreso').style.width = data.porcentaje + "%";
      document.getElementById('val-horas').innerText = data.totalHoras;
      document.getElementById('val-estudios').innerText = data.totalEstudios;
      document.getElementById('count-c').innerText = data.completados.length;
      document.getElementById('count-p').innerText = data.pendientes.length;

      document.getElementById('list-c').innerHTML = data.completados.map(u => `
        <div class="glass p-4 rounded-2xl flex justify-between items-center">
          <span class="font-semibold text-white">${u.nombre}</span>
          <span class="text-xs font-bold text-emerald-500">${u.participacion}h</span>
        </div>
      `).join('');

      document.getElementById('list-p').innerHTML = data.pendientes.map(u => `
        <div class="glass p-4 rounded-2xl flex justify-between items-center border-l-4 border-orange-500/50">
          <span class="font-semibold text-slate-300">${u.nombre}</span>
          <span class="text-[10px] font-bold text-slate-500 uppercase">${u.categoria}</span>
        </div>
      `).join('');

      lucide.createIcons();
      loading.classList.add('hidden');
      content.classList.remove('hidden');
    } catch (err) {
      alert("Error de conexión. Verifica que el Script esté desplegado como 'Cualquiera'.");
    }
  });
</script>
</body>
</html>
